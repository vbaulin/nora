- id: cam_001
  name: "Camera Sensor Init + Capture"
  priority: 2
  status: pending
  hypothesis_ref: h002
  steps:
    - id: check_sensor
      action: probe_cvitek
      parameters: {}
      expect:
        sensor_bound: "true"
      timeout: 10
      max_retries: 0
      on_fail: continue
    - id: capture_frame
      action: capture_image
      parameters:
        output_path: "/tmp/test_capture.jpg"
        mode: "none"
      expect:
        captured: "true"
      timeout: 30
      max_retries: 2
  success_criteria:
    - "test -f /tmp/test_capture.jpg"
