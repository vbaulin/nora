# ════════════════════════════════════════════════════════════════
# METADATA: LicheeRV Nano (SG2002) Autonomous Research Engine
# ════════════════════════════════════════════════════════════════
metadata:
  name: "licheerv-nano-agent"
  version: "v6.8.10"
  board: "LicheeRV Nano"
  soc: "SG2002"
  arch: "riscv64"
  ram_mb: 256
  sdk: "Cvitek/Sophgo TDL SDK (Native C++)"
  firmware: "/mnt/cfg/param/ (SDR Firmware Active)"

# ════════════════════════════════════════════════════════════════
# RESEARCH AGENDA: Hardware Hardening & Intelligence
# ════════════════════════════════════════════════════════════════
research_agenda:
  hypotheses:
    - id: h001
      claim: "Camera sensor can be initialized and captured via Maix-Python Skill (buff_num=2)"
      experiment: "Execute capture_image action to bypass ION memory limits"
      metric: camera_working
      status: untested
      priority: 1

    - id: h002
      claim: "Native NPU detection (YOLOv8) is possible using C++ SDK libraries"
      experiment: "Execute run_yolo with LD_LIBRARY_PATH=/root/libs_patch/lib"
      metric: npu_working
      status: untested
      priority: 1

    - id: h003
      claim: "Audio can be recorded using cvitekaadc driver (arecord)"
      experiment: "Execute capture_audio action for 2 seconds"
      metric: audio_working
      status: untested
      priority: 2

# ════════════════════════════════════════════════════════════════
# METRICS: Hardware verification
# ════════════════════════════════════════════════════════════════
metrics:
  camera_working:
    check: "test -f /tmp/capture.jpg && echo true || echo false"
    target: "true"
  npu_working:
    check: "grep -q 'Detected objects' /tmp/yolo_output.txt && echo true || echo false"
    target: "true"
  audio_working:
    check: "test -f /tmp/capture.wav && echo true || echo false"
    target: "true"

# ════════════════════════════════════════════════════════════════
# SELF-IMPROVEMENT: Path A (File-Driven) Mode
# ════════════════════════════════════════════════════════════════
self_improvement:
  enabled: true
  evolve_skills: true
  evolve_tasks: true
  evolve_program: true
  evolve_research: true
  strategy: "File-Driven (picoClaw writes tasks/ and skills/)"

strategy:
  use_llm: false  # Local agent is purely deterministic; picoClaw (Brain) handles LLM logic
  simplicity_bias: true
  recovery:
    - "If CMA allocation fails, fallback to ION heap (buff_num=2)"
    - "If NPU binary missing, fallback to Python-TFLite/CV2"

loop:
  never_stop: true
  poll_interval: 5
