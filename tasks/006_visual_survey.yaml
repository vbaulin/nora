- id: survey_001
  name: "Universal Visual Survey"
  priority: 5
  status: pending
  steps:
    - id: initialize
      action: probe_cvitek
      parameters: {}
      expect:
        sensor_bound: true
      timeout: 10
    - id: perception_loop
      action: run_yolo
      parameters:
        model_path: "/root/models/yolov8n.cvimodel"
        image_path: "/tmp/survey_frame.jpg"
        threshold: "0.6"
      expect:
        status: "ok"
      timeout: 60
      max_retries: 2
