- id: boot_001
  name: "Hardware Bootstrap Probe"
  priority: 1
  status: pending
  steps:
    - id: sys_info
      action: shell_cmd
      parameters:
        cmd: "uname -a && cat /proc/cpuinfo | head -20"
      expect:
        output_contains: "riscv"
      timeout: 10
      max_retries: 0
    - id: i2c_scan_bus1
      action: i2c_scan
      parameters:
        bus: "1"
      expect:
        count: ">=0"
      timeout: 10
      max_retries: 1
    - id: npu_check
      action: shell_cmd
      parameters:
        cmd: "ls -la /dev/cvitpu* 2>/dev/null || echo 'no_npu_device'"
      expect: {}
      timeout: 10
      max_retries: 0
  success_criteria:
    - "test -f results.tsv"
